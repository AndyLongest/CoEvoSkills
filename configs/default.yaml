# CoEvoSkills default configuration
# See paper §4.1, Table A1 for parameter descriptions

evolution:
  n: 5       # max oracle interventions (paper uses 5)
  m: 15      # max surrogate retries (paper uses 15)
  beta: 0.7  # context usage cap

timeout:
  evolution_multiplier: 5.0  # 5× effective 3000s/task
  evaluation: 7200           # 7200s/task oracle evaluation

workers:
  evolve: 4   # parallel workers during evolution
  eval: 10    # parallel workers during evaluation

oracle:
  partial_credit: false     # when true, Oracle returns passed/total ratio instead of binary 0/1
  converge_threshold: 1.0   # oracle_score >= this counts as converged

# LLM model selection (overridable via CLI)
llm_model: "deepseek-v4-pro"
verifier_model: null  # defaults to same as llm_model

sandbox:
  backend: "docker"   # "docker" | "local" (proot) | "bare" (no virtualization)
  image: "python:3.12-slim"

agent_harness: "opencode"   # "opencode" (CLI harness) | "agentloop" (JSON protocol, legacy)
opencode:
    model: "deepseek/deepseek-v4-flash"   # opencode provider/model format

# Paths
skillsbench_path: "./skillsbench"
output_dir: "./output"
